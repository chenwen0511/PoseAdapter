# Pose Adapter 参数配置

# 相机参数
camera:
  width: 1280
  height: 720

# 电表物理尺寸（米）
meter:
  width: 0.1
  height: 0.15

# 控制参数（步态偏柔和：降低速度与增益，减轻激进僵硬）
control:
  target_distance: 0.3      # 目标距离（米）
  target_ratio: 0.65        # 目标画面占比
  distance_tolerance: 0.05  # 距离容差
  angle_tolerance: 2.0      # 角度容差（度）
  center_tolerance: 0.05    # 中心偏差容差
  max_linear_speed: 0.15    # 最大线速度（m/s），稍微提高以确保能走动
  min_linear_speed: 0.12   # 最小线速度（m/s）；必须>0.1才能避免固件死区，机器狗才能走动
  max_angular_speed: 0.25   # 最大角速度（rad/s）
  
# Unitree SDK 控制模式（可选）
# use_high_level_sdk: true 时使用 SDK，false 时使用 cmd_vel
# 运动控制前提：请关闭避障，并使用遥控器 L2+A 站立、Start+R 进入经典步态（稀碎步）
unitree_sdk:
  enabled: true            # 是否启用 SDK 模式
  interface: "eth1"          # 网络接口名称 (eth0, enp2s0, wlan0 等)
  # 启动时尝试关闭避障（若 SDK 提供接口）；未支持时需在 APP 或 ros2 go2 obstacles_avoidance stop 手动关闭
  disable_obstacle_avoidance_on_start: true
  # 步态：必须设为 true 才能走小碎步！false=默认步态(易走步但步幅大)，true=经典稀碎步(柔和)
  # 重要：use_classic_walk=true + speed_level=-1 是让机器狗小碎步走动的关键
  use_classic_walk: true
  speed_level: -1  # 速度档位：-1=慢速(适合小碎步)，0=普通，1=快速

# 检测参数
detection:
  conf_threshold: 0.5
  iou_threshold: 0.45

# 追踪参数
tracking:
  max_age: 30
  min_hits: 3
  iou_threshold: 0.3

# 调试可视化参数（顶层）
publish_debug_image: true      # 是否发布调试图像到 /pose_adapter/debug_image
rtmp_url: ""                  # RTMP 推流地址，留空则不推流

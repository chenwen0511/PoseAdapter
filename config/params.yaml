# Pose Adapter 参数配置

# 相机参数
camera:
  width: 1280
  height: 720

# 电表物理尺寸（米）
meter:
  width: 0.2
  height: 0.3

# 控制参数（步态偏柔和：降低速度与增益，减轻激进僵硬）
control:
  target_distance: 1.7      # 目标距离（米）
  target_ratio: 0.65        # 目标画面占比
  distance_tolerance: 0.05  # 距离容差
  angle_tolerance: 2.0      # 角度容差（度）
  center_tolerance: 0.05    # 中心偏差容差
  max_linear_speed: 0.12    # 最大线速度（m/s），偏小更柔和
  min_linear_speed: 0.0     # 最小线速度（m/s）；若狗收到 Move 但不走可试 0.12~0.15 排除固件死区
  max_angular_speed: 0.25   # 最大角速度（rad/s），偏小更柔和
  
# Unitree SDK 控制模式（可选）
# use_high_level_sdk: true 时使用 SDK，false 时使用 cmd_vel
# 运动控制前提：请关闭避障，并使用遥控器 L2+A 站立、Start+R 进入经典步态（稀碎步）
unitree_sdk:
  enabled: true            # 是否启用 SDK 模式
  interface: "eth1"          # 网络接口名称 (eth0, enp2s0, wlan0 等)
  # 启动时尝试关闭避障（若 SDK 提供接口）；未支持时需在 APP 或 ros2 go2 obstacles_avoidance stop 手动关闭
  disable_obstacle_avoidance_on_start: true
  # 步态：false=默认步态(易走步)，true=经典稀碎步(柔和但部分固件不迈步)。speed_level: -1=慢 0=普通 1=快
  use_classic_walk: false
  speed_level: 0

# 检测参数
detection:
  conf_threshold: 0.5
  iou_threshold: 0.45

# 追踪参数
tracking:
  max_age: 30
  min_hits: 3
  iou_threshold: 0.3
